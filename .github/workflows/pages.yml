name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 2026-leaderboards/package-lock.json
      - run: npm ci
        working-directory: 2026-leaderboards
      - run: npm run lint
        working-directory: 2026-leaderboards
      - run: npm test
        working-directory: 2026-leaderboards
      - run: npm run build
        working-directory: 2026-leaderboards
      - run: |
          mkdir -p site site/2026-leaderboards
          cp -R 2026-leaderboards/dist/. site/
          cp -R 2026-leaderboards/dist/. site/2026-leaderboards/
          test -f site/index.html
          test -f site/2026-leaderboards/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
